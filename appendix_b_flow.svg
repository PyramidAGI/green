<svg xmlns="http://www.w3.org/2000/svg" width="900" height="620" viewBox="0 0 900 620" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#333"/>
    </marker>
    <marker id="arrowfb" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#c0392b"/>
    </marker>
    <style>
      .fn   { fill:#fde9c8; stroke:#e0a44a; stroke-width:2; rx:10; }
      .data { fill:#e8f1fb; stroke:#5b8fc7; stroke-width:2; rx:10; }
      .file { fill:#e9f7ec; stroke:#4caf72; stroke-width:2; rx:10; }
      .lbl  { font-size:15px; fill:#222; font-weight:600; }
      .sub  { font-size:11.5px; fill:#555; font-family:Consolas, monospace; }
      .edge { stroke:#333; stroke-width:2; fill:none; }
      .fb   { stroke:#c0392b; stroke-width:2; fill:none; stroke-dasharray:6 4; }
      .fblbl{ font-size:12px; fill:#c0392b; font-weight:600; }
      .title{ font-size:20px; fill:#111; font-weight:700; }
    </style>
  </defs>

  <text x="30" y="38" class="title">Appendix B — how the defs work together</text>

  <!-- Problem input -->
  <rect class="data" x="30"  y="70" width="180" height="58"/>
  <text x="120" y="95"  text-anchor="middle" class="lbl">Problem (text)</text>
  <text x="120" y="114" text-anchor="middle" class="sub">"pressure too low, dried dirt"</text>

  <!-- words_to_quarks -->
  <rect class="fn" x="280" y="66" width="220" height="66"/>
  <text x="390" y="92"  text-anchor="middle" class="lbl">words_to_quarks()</text>
  <text x="390" y="112" text-anchor="middle" class="sub">SYNONYMS table → quarks</text>

  <!-- mappings.log -->
  <rect class="file" x="560" y="70" width="170" height="58"/>
  <text x="645" y="95"  text-anchor="middle" class="lbl">mappings.log</text>
  <text x="645" y="114" text-anchor="middle" class="sub">misses → table grows</text>

  <!-- seed quarks -->
  <rect class="data" x="300" y="190" width="180" height="58"/>
  <text x="390" y="215" text-anchor="middle" class="lbl">seed quarks</text>
  <text x="390" y="234" text-anchor="middle" class="sub">force, time  (observable)</text>

  <!-- build_triangle -->
  <rect class="fn" x="300" y="300" width="220" height="78"/>
  <text x="410" y="326" text-anchor="middle" class="lbl">build_triangle()</text>
  <text x="410" y="346" text-anchor="middle" class="sub">pins left = seed,</text>
  <text x="410" y="362" text-anchor="middle" class="sub">unseen_ranked() picks action</text>

  <!-- triangle_score -->
  <rect class="fn" x="600" y="300" width="220" height="78"/>
  <text x="710" y="322" text-anchor="middle" class="lbl">triangle_score()</text>
  <text x="710" y="342" text-anchor="middle" class="sub">pair quality × role</text>
  <text x="710" y="358" text-anchor="middle" class="sub">coverage − redundancy</text>

  <!-- wires / draft -->
  <rect class="data" x="300" y="430" width="220" height="64"/>
  <text x="410" y="455" text-anchor="middle" class="lbl">wires → draft</text>
  <text x="410" y="475" text-anchor="middle" class="sub">doubletriangle_draft.csv</text>

  <!-- outcome -->
  <rect class="data" x="600" y="438" width="220" height="56"/>
  <text x="710" y="462" text-anchor="middle" class="lbl">outcome</text>
  <text x="710" y="481" text-anchor="middle" class="sub">solved / abandoned</text>

  <!-- update_weights -->
  <rect class="fn" x="600" y="540" width="220" height="60"/>
  <text x="710" y="565" text-anchor="middle" class="lbl">update_weights()</text>
  <text x="710" y="585" text-anchor="middle" class="sub">nudge role-combo scores</text>

  <!-- weights.json -->
  <rect class="file" x="300" y="540" width="220" height="60"/>
  <text x="410" y="565" text-anchor="middle" class="lbl">weights.json</text>
  <text x="410" y="585" text-anchor="middle" class="sub">loaded by score()</text>

  <!-- edges -->
  <path class="edge" d="M210,99 L278,99" marker-end="url(#arrow)"/>
  <path class="edge" d="M500,99 L558,99" marker-end="url(#arrow)"/>
  <path class="edge" d="M390,132 L390,188" marker-end="url(#arrow)"/>
  <path class="edge" d="M390,248 L410,298" marker-end="url(#arrow)"/>
  <path class="edge" d="M520,339 L598,339" marker-end="url(#arrow)"/>
  <text x="525" y="332" class="sub">wires</text>
  <path class="edge" d="M410,378 L410,428" marker-end="url(#arrow)"/>
  <path class="edge" d="M520,462 L598,464" marker-end="url(#arrow)"/>
  <path class="edge" d="M710,494 L710,538" marker-end="url(#arrow)"/>

  <!-- feedback edges (red) -->
  <path class="fb" d="M600,570 L522,570" marker-end="url(#arrowfb)"/>
  <path class="fb" d="M300,560 C150,540 150,360 298,339" marker-end="url(#arrowfb)"/>
  <text x="70" y="430" class="fblbl">feedback:</text>
  <text x="70" y="448" class="fblbl">scores learned</text>
  <text x="70" y="466" class="fblbl">from outcomes</text>

  <!-- legend -->
  <rect class="fn"   x="30" y="540" width="20" height="20"/>
  <text x="58" y="555" class="sub">function</text>
  <rect class="data" x="30" y="566" width="20" height="20"/>
  <text x="58" y="581" class="sub">data</text>
  <rect class="file" x="125" y="540" width="20" height="20"/>
  <text x="153" y="555" class="sub">log/file</text>
</svg>
